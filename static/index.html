<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrase Score Judge</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #fafafa;
            color: #222;
        }

        h1 { font-size: 22px; margin-bottom: 4px; }
        h2 { font-size: 16px; margin-bottom: 12px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }

        .upload-area {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .fields {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }

        .field { flex: 1; }
        .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .field input[type="file"] { font-size: 13px; }

        button { font-size: 14px; padding: 6px 16px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: default; }

        .progress {
            display: none;
            margin-top: 16px;
        }

        .progress.active { display: block; }

        .progress-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #333;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-status {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .log {
            margin-top: 12px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 10px 14px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            color: #555;
            line-height: 1.6;
        }

        .error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 4px;
            padding: 10px 14px;
            margin-top: 12px;
            color: #b91c1c;
            font-size: 13px;
        }

        .error.active { display: block; }

        .results { display: none; }
        .results.active { display: block; }

        .results h2 { margin-bottom: 8px; }
        .results .count { font-size: 13px; color: #888; margin-bottom: 16px; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #fff;
        }

        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
        }

        th { font-weight: 600; background: #f9f9f9; }

        td.score { font-weight: 700; }
        td.score.high { color: #16a34a; }
        td.score.mid { color: #ca8a04; }
        td.score.low { color: #dc2626; }
        td.na { color: #999; }

        @media (max-width: 600px) {
            .fields { flex-direction: column; }
        }
    </style>
</head>
<body>
    <h1>Phrase Score Judge</h1>
    <p class="subtitle">Upload a reference track and candidate audios to score and rank them.</p>

    <div class="upload-area">
        <div class="fields">
            <div class="field">
                <label>Reference Audio</label>
                <input type="file" id="refInput" accept="audio/*">
            </div>
            <div class="field">
                <label>Candidate Tracks (max 15)</label>
                <input type="file" id="candInput" accept="audio/*" multiple>
            </div>
        </div>
        <button id="analyzeBtn" disabled onclick="analyze()">Analyze</button>

        <div class="progress" id="progressSection">
            <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
            <div class="progress-status">
                <span id="progressMsg">Preparing...</span>
                <span><span id="progressCounter"></span> &mdash; <span id="progressPercent">0</span>%</span>
            </div>
            <div class="log" id="logPanel"></div>
        </div>

        <div class="error" id="errorMsg"></div>
    </div>

    <div class="results" id="resultsSection">
        <h2>Ranking</h2>
        <div class="count" id="trackCount"></div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Track</th>
                    <th>Score</th>
                    <th>DTW</th>
                    <th>Key Offset</th>
                    <th>SNR</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="rankingBody"></tbody>
        </table>
        <button onclick="exportResults()" style="margin-top:16px">Export results.json</button>
    </div>

    <script>
        var refFile = null;
        var candFiles = [];
        var lastRanking = null;
        var refInput = document.getElementById("refInput");
        var candInput = document.getElementById("candInput");
        var analyzeBtn = document.getElementById("analyzeBtn");

        refInput.addEventListener("change", function () {
            refFile = refInput.files.length > 0 ? refInput.files[0] : null;
            updateBtn();
        });

        candInput.addEventListener("change", function () {
            candFiles = Array.from(candInput.files).slice(0, 15);
            updateBtn();
        });

        function updateBtn() {
            analyzeBtn.disabled = !(refFile && candFiles.length > 0);
        }

        function addLog(msg) {
            var panel = document.getElementById("logPanel");
            var now = new Date();
            var ts = now.toTimeString().slice(0, 8);
            panel.textContent += "[" + ts + "] " + msg + "\n";
            panel.scrollTop = panel.scrollHeight;
        }

        function analyze() {
            var formData = new FormData();
            formData.append("reference", refFile);
            for (var i = 0; i < candFiles.length; i++) {
                formData.append("candidates", candFiles[i]);
            }

            var progressSection = document.getElementById("progressSection");
            var errorMsg = document.getElementById("errorMsg");
            var resultsSection = document.getElementById("resultsSection");

            progressSection.classList.add("active");
            errorMsg.classList.remove("active");
            resultsSection.classList.remove("active");
            document.getElementById("logPanel").textContent = "";
            document.getElementById("progressFill").style.width = "0%";
            document.getElementById("progressPercent").textContent = "0";
            document.getElementById("progressMsg").textContent = "Uploading...";
            document.getElementById("progressCounter").textContent = "";
            analyzeBtn.disabled = true;

            addLog("Uploading files...");

            fetch("/api/upload", { method: "POST", body: formData })
                .then(function (res) {
                    if (!res.ok) return res.json().then(function (d) { throw new Error(d.detail || "Upload failed"); });
                    return res.json();
                })
                .then(function (data) {
                    addLog("Upload done. Starting analysis...");
                    startSSE(data.session_id);
                })
                .catch(function (err) {
                    progressSection.classList.remove("active");
                    analyzeBtn.disabled = false;
                    errorMsg.textContent = err.message;
                    errorMsg.classList.add("active");
                });
        }

        function startSSE(sessionId) {
            var source = new EventSource("/api/process/" + sessionId);

            source.addEventListener("log", function (e) {
                var d = JSON.parse(e.data);
                document.getElementById("progressFill").style.width = d.progress + "%";
                document.getElementById("progressPercent").textContent = d.progress;
                document.getElementById("progressMsg").textContent = d.message;
                if (d.total > 0) document.getElementById("progressCounter").textContent = d.current + "/" + d.total;
                addLog(d.message);
            });

            source.addEventListener("result", function (e) {
                source.close();
                document.getElementById("progressSection").classList.remove("active");
                analyzeBtn.disabled = false;
                renderResults(JSON.parse(e.data).ranking);
            });

            source.onerror = function () {
                source.close();
                document.getElementById("progressSection").classList.remove("active");
                analyzeBtn.disabled = false;
                var err = document.getElementById("errorMsg");
                err.textContent = "Connection lost during processing.";
                err.classList.add("active");
            };
        }

        function renderResults(ranking) {
            lastRanking = ranking;
            var section = document.getElementById("resultsSection");
            var body = document.getElementById("rankingBody");
            var countEl = document.getElementById("trackCount");

            section.classList.add("active");
            countEl.textContent = ranking.length + " track" + (ranking.length !== 1 ? "s" : "");
            body.innerHTML = "";

            for (var i = 0; i < ranking.length; i++) {
                var r = ranking[i];
                var tr = document.createElement("tr");

                var rankText = r.rank !== null ? r.rank : "-";
                var scoreText = r.score !== null ? r.score.toFixed(1) : "N/A";
                var dtwText = r.dtw_score !== null ? r.dtw_score.toFixed(1) : "-";
                var keyText = r.key_offset_cents !== null ? r.key_offset_cents.toFixed(0) + "c" : "-";
                var snrText = r.snr !== null ? r.snr.toFixed(2) : "-";
                var statusText = r.reason ? r.reason : r.status;

                var scoreClass = "na";
                if (r.score !== null) {
                    if (r.score >= 70) scoreClass = "high";
                    else if (r.score >= 40) scoreClass = "mid";
                    else scoreClass = "low";
                }

                tr.innerHTML =
                    "<td>" + rankText + "</td>" +
                    "<td>" + r.track_id + "</td>" +
                    '<td class="score ' + scoreClass + '">' + scoreText + "</td>" +
                    "<td>" + dtwText + "</td>" +
                    "<td>" + keyText + "</td>" +
                    "<td>" + snrText + "</td>" +
                    "<td>" + statusText + "</td>";

                body.appendChild(tr);
            }
        }

        function exportResults() {
            if (!lastRanking) return;
            var blob = new Blob([JSON.stringify(lastRanking, null, 2)], {type: "application/json"});
            var a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "results.json";
            a.click();
        }
    </script>
</body>
</html>
